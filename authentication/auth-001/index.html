<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AUTH-001 — Ethereal Login Ultimate | UIXForge</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- Particle Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Ambient Orbs -->
    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <!-- Grid -->
    <div class="grid-overlay"></div>

    <!-- Main -->
    <div class="main-wrapper">
        <div class="orbit-ring"></div>
        
        <div class="login-card" id="loginCard">
            <div class="card-glare" id="cardGlare"></div>
            
            <!-- Success Overlay -->
            <div class="success-overlay" id="successOverlay">
                <div class="success-check">✓</div>
                <div class="success-text">Welcome Back!</div>
                <div class="success-sub">Redirecting to your dashboard...</div>
            </div>

            <div class="card-content">
                <!-- Brand -->
                <div class="brand-section">
                    <div class="logo-container">
                        <svg class="logo-svg" viewBox="0 0 60 60" fill="none">
                            <defs>
                                <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#6c5ce7"/>
                                    <stop offset="100%" stop-color="#00cec9"/>
                                </linearGradient>
                            </defs>
                            <path d="M30 5L52 17V41L30 53L8 41V17L30 5Z" stroke="url(#lg)" stroke-width="2" fill="none"/>
                            <circle cx="30" cy="29" r="8" fill="url(#lg)" opacity="0.8"/>
                            <path d="M30 15L42 22V36L30 43L18 36V22L30 15Z" stroke="url(#lg)" stroke-width="1.5" fill="none" opacity="0.6"/>
                        </svg>
                        <div class="logo-pulse"></div>
                    </div>
                    <h1 class="brand-title"><span class="title-gradient">UIXForge</span></h1>
                    <p class="brand-tagline">Where Design Meets Reality</p>
                </div>

                <!-- Welcome -->
                <div class="welcome-section">
                    <h2 class="welcome-title">Welcome Back</h2>
                    <p class="welcome-subtitle">Enter your realm of creativity</p>
                </div>

                <!-- Form -->
                <form class="login-form" id="loginForm" novalidate>
                    <!-- Email -->
                    <div class="input-group">
                        <div class="input-field-wrapper" id="emailWrapper">
                            <span class="field-icon">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                                </svg>
                            </span>
                            <input type="email" id="email" class="form-field" placeholder=" " autocomplete="email" required>
                            <label class="floating-label">Email Address</label>
                            <span class="field-status"></span>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <div class="input-field-wrapper" id="passwordWrapper">
                            <span class="field-icon">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16.5" r="1.5"/>
                                </svg>
                            </span>
                            <input type="password" id="password" class="form-field" placeholder=" " autocomplete="current-password" required>
                            <label class="floating-label">Password</label>
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" id="eyeIcon">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                            <span class="field-status"></span>
                        </div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar" data-level="1"></div>
                            <div class="strength-bar" data-level="2"></div>
                            <div class="strength-bar" data-level="3"></div>
                            <div class="strength-bar" data-level="4"></div>
                        </div>
                    </div>

                    <!-- Options -->
                    <div class="options-row">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="remember" checked>
                            <span class="checkbox-custom">
                                <svg class="check-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                            </span>
                            <span class="checkbox-label">Keep me signed in</span>
                        </label>
                        <button type="button" class="forgot-btn" id="forgotPassword">
                            <span>Recover access</span>
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Authenticate</span>
                        <span class="btn-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </span>
                        <div class="btn-shimmer"></div>
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider-section">
                    <span class="divider-line"></span>
                    <span class="divider-text">or continue with</span>
                    <span class="divider-line"></span>
                </div>

                <!-- Social -->
                <div class="social-section" id="socialSection">
                    <button class="social-btn" data-provider="Google">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        <span>Google</span>
                    </button>
                    <button class="social-btn" data-provider="GitHub">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        <span>GitHub</span>
                    </button>
                    <button class="social-btn" data-provider="Apple">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                        <span>Apple</span>
                    </button>
                </div>

                <!-- Signup -->
                <p class="signup-text">
                    New to the forge? 
                    <a href="#" class="signup-link">
                        Create account
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
